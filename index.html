<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дорожная карта инвестора</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #050A12;
  --surface:   #0C1420;
  --surface2:  #111C2E;
  --border:    rgba(255,255,255,0.07);
  --text:      #E8EDF5;
  --muted:     #7A8BA0;
  --accent:    #C9F53B;
  --accent2:   #3BF5C9;

  --s1: #1E4ED8; --s1l: #2563EB; --s1ll: rgba(30,78,216,.12);
  --s2: #0E9E74; --s2l: #10B981; --s2ll: rgba(14,158,116,.12);
  --s3: #C45200; --s3l: #EA6C20; --s3ll: rgba(196,82,0,.12);
  --s4: #7C2D9A; --s4l: #9D4FBB; --s4ll: rgba(124,45,154,.12);
  --s5: #856C00; --s5l: #B59500; --s5ll: rgba(133,108,0,.12);
  --s6: #1560A0; --s6l: #2080CC; --s6ll: rgba(21,96,160,.12);
  --s7: #1A3A3A; --s7l: #256A6A; --s7ll: rgba(26,58,58,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  font-size: 15px;
  line-height: 1.65;
  overflow-x: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content:'';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: .4;
}

/* ── HEADER ── */
header {
  position: relative;
  padding: 80px 24px 60px;
  text-align: center;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,245,59,.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 20% 50%, rgba(59,245,201,.06) 0%, transparent 60%);
  pointer-events: none;
}

.eyebrow {
  display: inline-block;
  font-family: 'Unbounded', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(201,245,59,.1);
  border: 1px solid rgba(201,245,59,.25);
  border-radius: 100px;
  padding: 14px 36px;
  margin-bottom: 24px;
}

h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1px;
  max-width: 820px;
  margin: 0 auto 20px;
}
h1 em { font-style: normal; color: var(--accent); }

.subtitle {
  color: var(--muted);
  font-size: 16px;
  max-width: 800px;
  margin: 0 auto 40px;
  font-weight: 300;
  white-space: nowrap;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-val {
  font-family: 'Unbounded', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.stat-label { font-size: 12px; color: var(--muted); letter-spacing: .5px; }

/* ── TIMELINE WRAPPER ── */
.timeline {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  position: relative;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 50px;
  top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,.1) 5%, rgba(255,255,255,.1) 95%, transparent);
}

/* ── STEP CARD ── */
.step {
  position: relative;
  margin-bottom: 48px;
  padding-left: 110px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity .55s ease, transform .55s ease;
}
.step.visible { opacity: 1; transform: translateY(0); }

.step-dot {
  position: absolute;
  left: 36px;
  top: 22px;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Unbounded', sans-serif;
  font-size: 10px; font-weight: 700;
  color: #fff;
  z-index: 2;
  box-shadow: 0 0 0 4px var(--bg), 0 0 20px rgba(0,0,0,.5);
}

.step-card {
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  background: var(--surface);
  transition: border-color .25s, box-shadow .25s;
}
.step-card:hover {
  border-color: rgba(255,255,255,.14);
  box-shadow: 0 8px 40px rgba(0,0,0,.35);
}

/* HEAD */
.step-head {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 16px;
  padding: 22px 24px 18px;
  cursor: pointer;
  user-select: none;
}
.step-head:hover { background: rgba(255,255,255,.02); }

.step-meta {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.step-num {
  font-family: 'Unbounded', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}
.step-time {
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--muted);
}
.step-title {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(14px, 2vw, 18px);
  font-weight: 700;
  line-height: 1.25;
  letter-spacing: -.3px;
}
.step-why {
  color: var(--muted);
  font-size: 13px;
  margin-top: 8px;
  font-style: italic;
  font-weight: 300;
  max-width: 700px;
}

.toggle-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .2s, color .2s, transform .3s;
  font-size: 14px;
  margin-top: 6px;
}
.toggle-btn:hover { background: rgba(255,255,255,.07); color: var(--text); }
.step-card.open .toggle-btn { transform: rotate(180deg); color: var(--text); }

/* BODY */
.step-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .5s cubic-bezier(.4,0,.2,1);
}
.step-card.open .step-body { max-height: 9999px; }

.step-inner {
  padding: 0 24px 24px;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 24px;
}
@media(max-width:700px){ .step-inner{ grid-template-columns: 1fr; } }

/* WHY PANEL */
.panel-why {
  background: rgba(255,255,255,.025);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
}
.panel-label {
  font-family: 'Unbounded', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: .5;
}
.why-text {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
  white-space: pre-line;
}
.why-bullet {
  display: flex; gap: 8px; margin-top: 6px;
  font-size: 13px; color: var(--text);
}
.why-bullet::before { content: '→'; color: var(--accent); flex-shrink: 0; }

.tg-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
  padding: 11px 16px;
  border-radius: 10px;
  background: rgba(39,174,239,.12);
  border: 1px solid rgba(39,174,239,.3);
  color: #7DD3FC;
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  transition: background .2s, border-color .2s, transform .15s;
  width: fit-content;
}
.tg-btn:hover {
  background: rgba(39,174,239,.22);
  border-color: rgba(39,174,239,.55);
  transform: translateX(3px);
}
.tg-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  flex-shrink: 0;
  object-fit: cover;
  /* убираем белый фон — у PNG уже круглая рамка */
  mix-blend-mode: normal;
}
.tg-arrow-icon {
  width: 22px; height: 22px;
  flex-shrink: 0;
  opacity: .8;
}
.tg-btn-inner { display: flex; flex-direction: column; gap: 1px; }
.tg-btn-label { font-size: 10px; font-weight: 400; opacity: .65; letter-spacing: .5px; text-transform: uppercase; }
.tg-btn-name  { font-size: 13px; font-weight: 700; }

/* RESOURCES */
.panel-resources { }
.resources-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.resource-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,.025);
  border: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
  transition: background .2s, border-color .2s, transform .15s;
  position: relative;
}
.resource-card:hover {
  background: rgba(255,255,255,.05);
  border-color: rgba(255,255,255,.14);
  transform: translateX(3px);
}

.resource-icon {
  font-size: 18px;
  flex-shrink: 0;
  margin-top: 1px;
  width: 28px; text-align: center;
}
.resource-content { flex: 1; min-width: 0; }
.resource-name {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
  margin-bottom: 3px;
}
.resource-what {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
}

.resource-format {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 100px;
  flex-shrink: 0;
  font-weight: 700;
  letter-spacing: .5px;
  align-self: flex-start;
  margin-top: 2px;
}
.fmt-text    { background: rgba(59,130,246,.15); color: #60A5FA; }
.fmt-video   { background: rgba(239,68,68,.15);  color: #FC9090; }
.fmt-youtube { background: rgba(239,68,68,.15);  color: #FC9090; }
.fmt-forum   { background: rgba(251,191,36,.15); color: #FBD14B; }
.fmt-service { background: rgba(52,211,153,.15); color: #34D399; }

.resource-arrow {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 12px;
  opacity: 0; transition: opacity .2s;
}
.resource-card:hover .resource-arrow { opacity: 1; }

/* RESULT STRIP */
.result-strip {
  margin-top: 20px;
  background: rgba(201,245,59,.04);
  border: 1px solid rgba(201,245,59,.15);
  border-radius: 12px;
  padding: 16px 18px;
}
.result-label {
  font-family: 'Unbounded', sans-serif;
  font-size: 9px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.result-items {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.result-item {
  font-size: 12px;
  padding: 4px 12px;
  background: rgba(201,245,59,.07);
  border: 1px solid rgba(201,245,59,.15);
  border-radius: 100px;
  color: var(--text);
  display: flex; align-items: center; gap: 5px;
}
.result-item::before { content: '✓'; color: var(--accent); font-weight: 700; }

/* DIVIDER BETWEEN PANELS */
.step-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0 24px;
}

/* ── STEP COLOR TINTING ── */
.step[data-s="1"] .step-dot  { background: var(--s1l); }
.step[data-s="1"] .step-card { border-color: rgba(37,99,235,.2); }
.step[data-s="1"] .step-num  { color: #60A5FA; }
.step[data-s="1"] .result-strip { background: rgba(37,99,235,.04); border-color: rgba(37,99,235,.2); }
.step[data-s="1"] .result-item  { background: rgba(37,99,235,.08); border-color: rgba(37,99,235,.25); }
.step[data-s="1"] .result-label { color: #60A5FA; }
.step[data-s="1"] .result-item::before { color: #60A5FA; }

.step[data-s="2"] .step-dot  { background: var(--s2l); }
.step[data-s="2"] .step-card { border-color: rgba(16,185,129,.2); }
.step[data-s="2"] .step-num  { color: #34D399; }
.step[data-s="2"] .result-strip { background: rgba(16,185,129,.04); border-color: rgba(16,185,129,.2); }
.step[data-s="2"] .result-item  { background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.25); }
.step[data-s="2"] .result-label { color: #34D399; }
.step[data-s="2"] .result-item::before { color: #34D399; }

.step[data-s="3"] .step-dot  { background: var(--s3l); }
.step[data-s="3"] .step-card { border-color: rgba(234,108,32,.2); }
.step[data-s="3"] .step-num  { color: #FB923C; }
.step[data-s="3"] .result-strip { background: rgba(234,108,32,.04); border-color: rgba(234,108,32,.2); }
.step[data-s="3"] .result-item  { background: rgba(234,108,32,.08); border-color: rgba(234,108,32,.25); }
.step[data-s="3"] .result-label { color: #FB923C; }
.step[data-s="3"] .result-item::before { color: #FB923C; }

.step[data-s="4"] .step-dot  { background: var(--s4l); }
.step[data-s="4"] .step-card { border-color: rgba(157,79,187,.2); }
.step[data-s="4"] .step-num  { color: #C084FC; }
.step[data-s="4"] .result-strip { background: rgba(157,79,187,.04); border-color: rgba(157,79,187,.2); }
.step[data-s="4"] .result-item  { background: rgba(157,79,187,.08); border-color: rgba(157,79,187,.25); }
.step[data-s="4"] .result-label { color: #C084FC; }
.step[data-s="4"] .result-item::before { color: #C084FC; }

.step[data-s="5"] .step-dot  { background: var(--s5l); }
.step[data-s="5"] .step-card { border-color: rgba(181,149,0,.2); }
.step[data-s="5"] .step-num  { color: #FCD34D; }
.step[data-s="5"] .result-strip { background: rgba(181,149,0,.04); border-color: rgba(181,149,0,.2); }
.step[data-s="5"] .result-item  { background: rgba(181,149,0,.08); border-color: rgba(181,149,0,.25); }
.step[data-s="5"] .result-label { color: #FCD34D; }
.step[data-s="5"] .result-item::before { color: #FCD34D; }

.step[data-s="6"] .step-dot  { background: var(--s6l); }
.step[data-s="6"] .step-card { border-color: rgba(32,128,204,.2); }
.step[data-s="6"] .step-num  { color: #7DD3FC; }
.step[data-s="6"] .result-strip { background: rgba(32,128,204,.04); border-color: rgba(32,128,204,.2); }
.step[data-s="6"] .result-item  { background: rgba(32,128,204,.08); border-color: rgba(32,128,204,.25); }
.step[data-s="6"] .result-label { color: #7DD3FC; }
.step[data-s="6"] .result-item::before { color: #7DD3FC; }

.step[data-s="7"] .step-dot  { background: var(--s7l); }
.step[data-s="7"] .step-card { border-color: rgba(37,106,106,.25); }
.step[data-s="7"] .step-num  { color: #5EEAD4; }
.step[data-s="7"] .result-strip { background: rgba(37,106,106,.04); border-color: rgba(37,106,106,.2); }
.step[data-s="7"] .result-item  { background: rgba(37,106,106,.08); border-color: rgba(37,106,106,.25); }
.step[data-s="7"] .result-label { color: #5EEAD4; }
.step[data-s="7"] .result-item::before { color: #5EEAD4; }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 40px 20px 60px;
  color: var(--muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
}
.footer-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Unbounded', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--accent); letter-spacing: 1px;
  margin-bottom: 12px;
}

/* ── SCROLL PROGRESS ── */
#progress {
  position: fixed; top: 0; left: 0;
  height: 3px; width: 0;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  z-index: 1000;
  transition: width .1s;
}

/* ── EXPAND ALL BTN ── */
.controls {
  display: flex; justify-content: center; gap: 12px;
  margin-bottom: 32px;
}
.ctrl-btn {
  font-family: 'Mulish', sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 8px 20px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── STICKY NAV ── */
.step-nav {
  position: sticky; top: 12px;
  z-index: 100;
  display: flex; justify-content: center;
  margin-bottom: 32px;
  pointer-events: none;
}
.step-nav-inner {
  display: flex; gap: 6px;
  background: rgba(12,20,32,.85);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 10px;
  pointer-events: all;
}
.nav-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Unbounded', sans-serif;
  font-size: 10px; font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.nav-dot:hover, .nav-dot.active { color: #fff; }
.nav-dot[data-s="1"]:hover, .nav-dot[data-s="1"].active { background: var(--s1l); border-color: var(--s1l); }
.nav-dot[data-s="2"]:hover, .nav-dot[data-s="2"].active { background: var(--s2l); border-color: var(--s2l); }
.nav-dot[data-s="3"]:hover, .nav-dot[data-s="3"].active { background: var(--s3l); border-color: var(--s3l); }
.nav-dot[data-s="4"]:hover, .nav-dot[data-s="4"].active { background: var(--s4l); border-color: var(--s4l); }
.nav-dot[data-s="5"]:hover, .nav-dot[data-s="5"].active { background: var(--s5l); border-color: var(--s5l); }
.nav-dot[data-s="6"]:hover, .nav-dot[data-s="6"].active { background: var(--s6l); border-color: var(--s6l); }
.nav-dot[data-s="7"]:hover, .nav-dot[data-s="7"].active { background: var(--s7l); border-color: var(--s7l); }

/* ── HEADER LOGO ── */
.header-logo {
  position: absolute;
  top: 24px;
  right: 28px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(201,245,59,.35);
  box-shadow: 0 0 16px rgba(201,245,59,.15);
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  z-index: 10;
}
.header-logo:hover {
  transform: scale(1.08);
  box-shadow: 0 0 24px rgba(201,245,59,.3);
}
.header-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header-logo {
  position: absolute;
  top: 24px;
  right: 32px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(201,245,59,.35);
  box-shadow: 0 0 18px rgba(201,245,59,.2);
}
@media(max-width:600px){
  .header-logo { width: 48px; height: 48px; top: 16px; right: 16px; }
}

</style>
</head>
<body>

function toggleStep(head) {
  const card = head.closest(".step-card");
  card.classList.toggle("open");
}

function expandAll() {
  document.querySelectorAll(".step-card").forEach(c => c.classList.add("open"));
}
function collapseAll() {
  document.querySelectorAll(".step-card").forEach(c => c.classList.remove("open"));
}

// Intersection Observer for scroll animations + nav
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add("visible");
      const s = e.target.dataset.s;
      document.querySelectorAll(".nav-dot").forEach(d =>
        d.classList.toggle("active", d.dataset.s == s)
      );
    }
  });
}, { threshold: 0.15 });

// Scroll progress
window.addEventListener("scroll", () => {
  const h = document.documentElement;
  const pct = (window.scrollY / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById("progress").style.width = pct + "%";
});

// Init
buildSteps();
document.querySelectorAll(".step").forEach(el => io.observe(el));

// Open first step by default
setTimeout(() => {
  document.querySelector(".step-card")?.classList.add("open");
}, 400);
</script>
